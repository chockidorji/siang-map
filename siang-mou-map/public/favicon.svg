<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- A miniature push-pin matching the on-map PFR marker:
       - slate-600 stem with a rounded tip
       - emerald-600 ball (the >=80% colour) for a confident, "agreed" feel
       - subtle white highlight for a glossy three-dimensional read at favicon scale -->
  <line x1="32" y1="32" x2="32" y2="60"
        stroke="#475569" stroke-width="5" stroke-linecap="round"/>
  <circle cx="32" cy="22" r="18" fill="#059669"/>
  <ellipse cx="26" cy="16" rx="6" ry="4" fill="#FFFFFF" opacity="0.45"/>
</svg>
